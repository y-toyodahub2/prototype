<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1">
  <title>ビットコインをはじめよう</title>
  <style>
    :root {
      /* === DS4.0 カラートークン === */
      --brand-primary: #ff333f;
      --brand-secondary-bg: #fff5f5;
      --accent-blue: #4dc9ff;
      --checkbox-blue: #006ed1;

      --text-primary: #333333;
      --text-secondary: #666666;
      --text-white: #ffffff;

      --bg-primary: #ffffff;
      --bg-secondary: #f0f0f0;
      --bg-tertiary: #ffffff;

      --border-primary: #c7c7c7;
      --dot-inactive: #d9d9d9;

      /* === DS4.0 スペーシングトークン === */
      --space-0:  0px;
      --space-2:  2px;
      --space-4:  4px;
      --space-8:  8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-24: 24px;

      /* === DS4.0 ボーダーラジアストークン === */
      --radius-sm:   4px;
      --radius-md:   8px;
      --radius-lg:   16px;
      --radius-full: 999px;

      /* === DS4.0 タイポグラフィトークン === */
      --font: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', 'Noto Sans JP', sans-serif;
      --size-xs:  12px;
      --size-sm:  14px;
      --size-md:  15px;
      --size-lg:  17px;
      --size-xl:  20px;
      --size-2xl: 26px;
      --fw-regular: 300;
      --fw-bold:    600;
      --lh-body:   1.4;
      --lh-button: 1.25;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #c8c8c8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 0 60px;
      font-family: var(--font);
    }

    /* ===== 電話フレーム ===== */
    .phone {
      width: 375px;
      height: 812px;
      background: var(--bg-primary);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 44px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(0,0,0,0.1);
    }

    /* ===== Status Bar ===== */
    .status-bar {
      height: 54px;
      padding: 14px 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .status-time {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      min-width: 60px;
    }
    .dynamic-island-spacer { width: 120px; }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 60px;
      justify-content: flex-end;
    }

    /* ===== Half Modal (スクロール領域) ===== */
    .halfmodal {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      background: var(--bg-tertiary);
    }

    /* ===== コンテンツ上部 ===== */
    .content-top {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
      flex-shrink: 0;
    }

    /* ===== Top Navigation ===== */
    .top-nav {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }
    .nav-btn {
      position: absolute;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      border: none;
      border-radius: var(--radius-full);
    }
    .nav-btn:active { opacity: 0.5; }
    .nav-btn-left  { left: 4px; }
    .nav-btn-right { right: 4px; }
    .nav-title {
      font-size: var(--size-lg);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      text-align: center;
      line-height: var(--lh-body);
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== Separator ===== */
    .separator {
      height: 1px;
      background: var(--border-primary);
      flex-shrink: 0;
    }

    /* ===== ステップインジケーター ===== */
    .step-indicators {
      display: flex;
      justify-content: center;
      gap: var(--space-8);
      padding: var(--space-16);
      flex-shrink: 0;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--dot-inactive);
    }
    .dot.active { background: var(--brand-primary); }

    /* ===== イラストエリア ===== */
    .illustration-wrapper {
      height: 240px;
      position: relative;
      flex-shrink: 0;
      overflow: visible;
    }
    .illustration-card {
      position: absolute;
      left: 60px;
      top: 61px;
      width: 256px;
      height: 144px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mascot-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    /* コイン装飾 */
    .deco-coin {
      position: absolute;
      right: 52px;
      top: 90px;
      width: 45px;
      height: 45px;
      object-fit: contain;
    }

    /* ===== スピーチバブル + タイトル ===== */
    .text-content {
      padding: 0 var(--space-24);
      display: flex;
      flex-direction: column;
      gap: var(--space-16);
      align-items: center;
      flex-shrink: 0;
    }
    .speech-bubble-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .speech-bubble {
      background: var(--accent-blue);
      border-radius: 3.5px;
      padding: 6px var(--space-16) 4px;
      color: var(--text-white);
      font-size: var(--size-sm);
      font-weight: var(--fw-bold);
      text-align: center;
      white-space: nowrap;
      line-height: 1.6;
    }
    .speech-bubble-arrow {
      width: 0;
      height: 0;
      border-left: 5.8px solid transparent;
      border-right: 5.8px solid transparent;
      border-top: 8px solid var(--accent-blue);
    }
    .main-titles {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .title-line1 {
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      text-align: center;
      letter-spacing: 0.52px;
      line-height: 1.6;
    }
    .title-line1 .t-normal { font-size: var(--size-xl); }
    .title-line1 .t-large  { font-size: var(--size-2xl); }
    .title-line2 {
      font-size: var(--size-xl);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      text-align: center;
      line-height: 1.6;
    }

    /* ===== フッター ===== */
    .footer {
      flex-shrink: 0;
      background: var(--bg-tertiary);
      display: flex;
      flex-direction: column;
    }

    /* ===== プロモーションカード ===== */
    .promo-section {
      padding: 0 var(--space-16);
    }
    .promo-card {
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-8) var(--space-24) var(--space-16);
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
      align-items: center;
    }
    .promo-header {
      display: flex;
      align-items: center;
      gap: var(--space-12);
      width: 100%;
    }
    .promo-line {
      flex: 1;
      height: 1px;
      background: var(--border-primary);
    }
    .promo-label {
      font-size: 12.7px;
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      white-space: nowrap;
      line-height: 1.6;
    }
    .promo-body {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }
    .promo-left-img {
      height: 35px;
      width: auto;
      object-fit: contain;
    }
    .promo-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .promo-coin-img {
      width: 37px;
      height: 37px;
      object-fit: contain;
    }
    .promo-amount-img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }

    /* ===== チェックボックスフィールド ===== */
    .checkbox-section {
      padding: 0 var(--space-16);
    }
    .checkbox-field {
      display: flex;
      align-items: flex-start;
      gap: var(--space-12);
      min-height: 56px;
      padding: var(--space-8) 0;
    }
    .checkbox-box {
      width: 20px;
      height: 20px;
      border-radius: var(--radius-sm);
      background: var(--checkbox-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .checkbox-check-img {
      width: 14px;
      height: 14px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    .checkbox-text-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      padding: var(--space-8) 0;
    }
    .checkbox-label {
      font-size: var(--size-md);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      line-height: var(--lh-body);
    }
    .checkbox-hint {
      font-size: var(--size-xs);
      font-weight: var(--fw-regular);
      color: var(--text-secondary);
      line-height: var(--lh-body);
    }

    /* ===== CTA ボタン ===== */
    .cta-area {
      flex-shrink: 0;
    }
    .cta-buttons {
      display: flex;
      gap: var(--space-16);
      padding: var(--space-16);
    }
    .btn {
      flex: 1;
      min-height: 44px;
      border-radius: var(--radius-md);
      font-size: var(--size-md);
      font-weight: var(--fw-bold);
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: var(--lh-button);
      border: none;
      padding: var(--space-8) var(--space-12);
      overflow: hidden;
    }
    .btn:active { opacity: 0.7; }
    .btn-secondary {
      background: var(--bg-primary);
      border: 1px solid var(--brand-primary);
      color: var(--brand-primary);
    }
    .btn-primary {
      background: var(--brand-primary);
      color: var(--text-white);
    }

    /* ===== ホームインジケーター ===== */
    .home-indicator {
      height: 34px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
    }
    .home-bar {
      width: 144px;
      height: 5px;
      background: var(--text-primary);
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- ① Status Bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="dynamic-island-spacer"></div>
      <div class="status-icons">
        <!-- Cellular -->
        <svg width="19" height="13" viewBox="0 0 19 13" fill="none">
          <rect x="0"  y="9"  width="3" height="4"  rx="0.5" fill="#333"/>
          <rect x="4"  y="6"  width="3" height="7"  rx="0.5" fill="#333"/>
          <rect x="8"  y="3"  width="3" height="10" rx="0.5" fill="#333"/>
          <rect x="12" y="0"  width="3" height="13" rx="0.5" fill="#333"/>
          <rect x="16" y="0"  width="3" height="13" rx="0.5" fill="#333" opacity="0.3"/>
        </svg>
        <!-- Wifi -->
        <svg width="17" height="13" viewBox="0 0 17 13" fill="none">
          <circle cx="8.5" cy="11.5" r="1.5" fill="#333"/>
          <path d="M4.2 7.8C5.5 6.3 6.9 5.6 8.5 5.6s3 .7 4.3 2.2" stroke="#333" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <path d="M1 4.5C3 2.1 5.5 0.7 8.5 0.7S14 2.1 16 4.5" stroke="#333" stroke-width="1.3" stroke-linecap="round" fill="none"/>
        </svg>
        <!-- Battery -->
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
          <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#333" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="18" height="9" rx="1.5" fill="#333"/>
          <path d="M24.5 4.5v4a2 2 0 0 0 0-4z" fill="#333" fill-opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- ② Half Modal -->
    <div class="halfmodal">

      <!-- ② コンテンツ上部 -->
      <div class="content-top">

        <!-- ② Top Navigation -->
        <div class="top-nav">
          <!-- 左: 閉じるボタン -->
          <button class="nav-btn nav-btn-left" aria-label="閉じる">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M18 6L6 18M6 6l12 12" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="nav-title">ビットコインをはじめよう</span>
        </div>
        <div class="separator"></div>

        <!-- ② ステップインジケーター -->
        <div class="step-indicators">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot active"></div>
        </div>

        <!-- ② イラストエリア -->
        <div class="illustration-wrapper">
          <div class="illustration-card">
            <img
              class="mascot-img"
              src="https://www.figma.com/api/mcp/asset/75f87bf4-5bfa-466f-af96-b2cb3b235181"
              alt="マスコットキャラクター"
            />
          </div>
          <!-- Bitcoin コイン装飾 -->
          <img
            class="deco-coin"
            src="https://www.figma.com/api/mcp/asset/7b37fc60-b05c-4788-8798-82be12f195e9"
            alt=""
          />
        </div>

        <!-- ② スピーチバブル + メインタイトル -->
        <div class="text-content">
          <div class="speech-bubble-wrap">
            <div class="speech-bubble">リスクをおさえたい初心者向け</div>
            <div class="speech-bubble-arrow"></div>
          </div>
          <div class="main-titles">
            <p class="title-line1">
              <span class="t-normal">コツコツ</span><span class="t-large">「つみたて」</span>
            </p>
            <p class="title-line2">未来のためのお金</p>
          </div>
        </div>

      </div><!-- /content-top -->

      <!-- ③ フッター -->
      <div class="footer">

        <!-- ③ プロモーションカード -->
        <div class="promo-section">
          <div class="promo-card">
            <div class="promo-header">
              <div class="promo-line"></div>
              <span class="promo-label">今ならもらえる</span>
              <div class="promo-line"></div>
            </div>
            <div class="promo-body">
              <!-- 左: テキスト画像 -->
              <img
                class="promo-left-img"
                src="https://www.figma.com/api/mcp/asset/bdfde19a-9ee6-4afb-84de-870eb100a0b0"
                alt="1,000円×3ヶ月つみたてると"
              />
              <!-- 右: コインアイコン + 500円分 -->
              <div class="promo-right">
                <img
                  class="promo-coin-img"
                  src="https://www.figma.com/api/mcp/asset/44141090-f4a5-4e82-9b1b-0ebf917979cd"
                  alt="コイン"
                />
                <img
                  class="promo-amount-img"
                  src="https://www.figma.com/api/mcp/asset/47986de4-058f-4741-b651-dde23fdb04e0"
                  alt="500円分"
                />
              </div>
            </div>
          </div>
        </div>

        <!-- ③ チェックボックスフィールド -->
        <div class="checkbox-section">
          <div class="checkbox-field">
            <div class="checkbox-box">
              <img
                class="checkbox-check-img"
                src="https://www.figma.com/api/mcp/asset/b748e12f-baa9-424a-a36d-03431c8c6e95"
                alt="チェック"
              />
            </div>
            <div class="checkbox-text-wrap">
              <span class="checkbox-label">毎月1,000円からつみたててみる</span>
              <span class="checkbox-hint">つみたて内容の変更・解除はいつでもできます</span>
            </div>
          </div>
        </div>

        <!-- ③ CTA -->
        <div class="cta-area">
          <div class="separator"></div>
          <div class="cta-buttons">
            <button class="btn btn-secondary">戻る</button>
            <button class="btn btn-primary">次へ</button>
          </div>
          <div class="home-indicator">
            <div class="home-bar"></div>
          </div>
        </div>

      </div><!-- /footer -->

    </div><!-- /halfmodal -->

  </div><!-- /phone -->
</body>
</html>
