<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ビットコインをはじめよう</title>
  <style>
    /* =============================================
       DS4.0 Design Tokens
       ============================================= */
    :root {
      --foreground-basic-primary:     #333333;
      --foreground-basic-secondary:   #666666;
      --foreground-basic-tertiary:    #ffffff;
      --foreground-attention-primary: #ff333f;

      --background-basic-primary:   #f5f5f5;
      --background-basic-secondary: #eeeeee;
      --background-basic-tertiary:  #ffffff;
      --background-brand-primary:   #ff333f;
      --background-accent-primary:  #006ed1;

      --border-basic-primary: #c7c7c7;

      --typeface-ios: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;

      --fontweight-bold:    600;
      --fontweight-regular: 300;

      --fontsize-large:  17px;
      --fontsize-medium: 15px;
      --fontsize-small:  14px;
      --fontsize-xsmall: 12px;

      --lineheight-body:   1.4;
      --lineheight-button: 1.25;

      --spacing4:  4px;
      --spacing8:  8px;
      --spacing12: 12px;
      --spacing16: 16px;
      --spacing24: 24px;

      --radius-small:  4px;
      --radius-medium: 8px;
      --radius-large:  16px;

      --border-extra-thin: 0.5px;
      --border-thin:       1px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--background-basic-primary);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--typeface-ios);
      color: var(--foreground-basic-primary);
    }

    /* =============================================
       Device
       ============================================= */
    .device {
      width: 375px;
      min-height: 812px;
      position: relative;
      overflow: hidden;
      background: var(--background-basic-tertiary);
    }

    /* 背景アプリ */
    .bg-app {
      position: absolute;
      inset: 0;
      background: var(--background-basic-primary);
      display: flex;
      flex-direction: column;
    }
    .bg-status {
      height: 54px;
      background: var(--background-basic-tertiary);
      display: flex;
      align-items: flex-end;
      padding: 0 var(--spacing16) var(--spacing8);
      justify-content: space-between;
      flex-shrink: 0;
    }
    .bg-status-time {
      font-size: var(--fontsize-large);
      font-weight: var(--fontweight-bold);
      color: var(--foreground-basic-primary);
    }
    .bg-status-icons { display: flex; align-items: center; gap: var(--spacing8); }
    .bg-nav {
      height: 44px;
      background: var(--background-basic-tertiary);
      border-bottom: var(--border-extra-thin) solid var(--border-basic-primary);
      display: flex; align-items: center;
      padding: 0 var(--spacing16); flex-shrink: 0;
    }
    .bg-nav-title {
      font-size: var(--fontsize-large);
      font-weight: var(--fontweight-bold);
      color: var(--foreground-basic-primary);
    }
    .bg-content {
      flex: 1; padding: var(--spacing16);
      display: flex; flex-direction: column;
      gap: var(--spacing12); overflow: hidden;
    }
    .bg-card {
      background: var(--background-basic-tertiary);
      border-radius: var(--radius-medium);
      padding: var(--spacing12);
      display: flex; gap: var(--spacing12);
      align-items: center; opacity: 0.55;
    }
    .bg-thumb {
      width: 60px; height: 60px;
      border-radius: var(--radius-medium);
      background: var(--background-basic-secondary);
      flex-shrink: 0;
    }
    .bg-lines { display: flex; flex-direction: column; gap: var(--spacing4); }
    .bg-line-a { width: 140px; height: 11px; background: var(--background-basic-secondary); border-radius: var(--radius-small); }
    .bg-line-b { width: 90px;  height: 9px;  background: var(--background-basic-secondary); border-radius: var(--radius-small); opacity: 0.7; }
    .bg-line-c { width: 60px;  height: 11px; background: var(--background-basic-secondary); border-radius: var(--radius-small); margin-top: var(--spacing4); }

    /* スクリム */
    .overlay {
      position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    /* =============================================
       Bottom Sheet
       ============================================= */
    .sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 540px;
      background: var(--background-basic-tertiary);
      border-radius: var(--radius-large) var(--radius-large) 0 0;
      display: flex; flex-direction: column;
    }
    .sheet-handle {
      display: flex; justify-content: center;
      padding: var(--spacing8) 0 var(--spacing4);
    }
    .sheet-handle-bar {
      width: 36px; height: 4px;
      background: var(--border-basic-primary); border-radius: 99px;
    }
    .sheet-nav {
      height: 44px;
      display: flex; align-items: center; position: relative;
      border-bottom: var(--border-extra-thin) solid var(--border-basic-primary);
      padding: 0 var(--spacing4); flex-shrink: 0;
    }
    .sheet-nav-close {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .sheet-nav-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: var(--fontsize-large);
      font-weight: var(--fontweight-bold);
      line-height: var(--lineheight-body);
      color: var(--foreground-basic-primary);
      white-space: nowrap;
    }
    .paging {
      display: flex; justify-content: center;
      gap: var(--spacing8);
      padding: var(--spacing8) var(--spacing16);
    }
    .dot { width: 4px; height: 4px; border-radius: 99px; background: var(--border-basic-primary); }
    .dot.active { background: var(--foreground-attention-primary); }

    /* =============================================
       Sheet Body
       ============================================= */
    .sheet-body {
      flex: 1;
      padding: var(--spacing4) var(--spacing16) 0;
      display: flex; flex-direction: column;
      gap: var(--spacing12);
      overflow: hidden;
    }

    /* メッセージ */
    .message-title {
      font-size: var(--fontsize-large);
      font-weight: var(--fontweight-bold);
      line-height: var(--lineheight-body);
      color: var(--foreground-basic-primary);
      text-align: center;
    }
    .message-body {
      font-size: var(--fontsize-small);
      font-weight: var(--fontweight-regular);
      line-height: var(--lineheight-body);
      color: var(--foreground-basic-secondary);
      text-align: center;
    }

    /* チャートエリア */
    .chart-wrap {
      background: var(--background-basic-primary);
      border-radius: var(--radius-medium);
      padding: var(--spacing12) var(--spacing12) var(--spacing8);
      display: flex;
      flex-direction: column;
      gap: var(--spacing8);
    }
    .chart-inner {
      display: flex;
      align-items: flex-start;
      gap: var(--spacing4);
    }
    .chart-y-axis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-shrink: 0;
      height: 90px;
      align-items: flex-end;
    }
    .y-label {
      font-size: 5.5px;
      color: var(--foreground-basic-secondary);
      white-space: nowrap;
      line-height: 1;
    }
    .chart-images {
      flex: 1;
      position: relative;
      height: 90px;
    }
    .chart-grid {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
    }
    .chart-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 68px;
      object-fit: fill;
    }
    .chart-x-labels {
      display: flex;
      justify-content: space-between;
      padding-top: var(--spacing4);
    }
    .x-label {
      font-size: var(--fontsize-xsmall);
      color: var(--foreground-basic-secondary);
      font-weight: var(--fontweight-regular);
    }
    .chart-note {
      font-size: var(--fontsize-xsmall);
      font-weight: var(--fontweight-regular);
      line-height: var(--lineheight-body);
      color: var(--foreground-basic-secondary);
      text-align: right;
    }

    /* ハイライトテキスト */
    .highlight-row {
      display: flex;
      align-items: center;
      gap: var(--spacing8);
      background: var(--background-basic-tertiary);
      border: var(--border-thin) solid var(--border-basic-primary);
      border-radius: var(--radius-medium);
      padding: var(--spacing12) var(--spacing16);
    }
    .highlight-icon { flex-shrink: 0; }
    .highlight-text {
      font-size: var(--fontsize-xsmall);
      font-weight: var(--fontweight-regular);
      line-height: var(--lineheight-body);
      color: var(--foreground-basic-secondary);
    }
    .highlight-text strong {
      font-weight: var(--fontweight-bold);
      color: var(--foreground-basic-primary);
    }

    /* 次へボタン */
    .action-btn {
      width: 100%; min-height: 44px;
      background: var(--background-brand-primary);
      border: none; border-radius: var(--radius-medium);
      font-family: var(--typeface-ios);
      font-size: var(--fontsize-medium);
      font-weight: var(--fontweight-bold);
      line-height: var(--lineheight-button);
      color: var(--foreground-basic-tertiary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    /* スキップ */
    .btn-skip {
      width: 100%; padding: var(--spacing8) 0;
      background: transparent; border: none;
      font-family: var(--typeface-ios);
      font-size: var(--fontsize-medium);
      font-weight: var(--fontweight-regular);
      line-height: var(--lineheight-button);
      color: var(--foreground-basic-secondary);
      text-align: center; cursor: pointer;
    }

    /* Home indicator */
    .home-indicator {
      height: 34px;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: var(--spacing8);
      margin-top: var(--spacing8);
    }
    .home-bar {
      width: 134px; height: 5px;
      background: var(--foreground-basic-primary);
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <div class="device">

    <!-- 背景アプリ -->
    <div class="bg-app">
      <div class="bg-status">
        <span class="bg-status-time">9:41</span>
        <div class="bg-status-icons">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="#333">
            <rect x="0" y="8" width="3" height="4" rx="0.5"/>
            <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5"/>
            <rect x="9" y="3" width="3" height="9" rx="0.5"/>
            <rect x="13.5" y="0" width="3" height="12" rx="0.5"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 4.5C3.5 2 12.5 2 15 4.5"/>
            <path d="M3.2 6.8C5 5.1 11 5.1 12.8 6.8"/>
            <path d="M5.5 9C6.5 8 9.5 8 10.5 9"/>
            <circle cx="8" cy="11" r="0.8" fill="#333" stroke="none"/>
          </svg>
          <svg width="26" height="12" viewBox="0 0 26 12">
            <rect x="0" y="1" width="22" height="10" rx="2" stroke="#333" stroke-width="1" fill="none"/>
            <rect x="22.5" y="3.5" width="2" height="5" rx="1" fill="#333"/>
            <rect x="1.5" y="2.5" width="18" height="7" rx="1.2" fill="#333"/>
          </svg>
        </div>
      </div>
      <div class="bg-nav"><span class="bg-nav-title">ホーム</span></div>
      <div class="bg-content">
        <div class="bg-card">
          <div class="bg-thumb"></div>
          <div class="bg-lines"><div class="bg-line-a"></div><div class="bg-line-b"></div><div class="bg-line-c"></div></div>
        </div>
        <div class="bg-card">
          <div class="bg-thumb"></div>
          <div class="bg-lines"><div class="bg-line-a"></div><div class="bg-line-b"></div><div class="bg-line-c"></div></div>
        </div>
        <div class="bg-card">
          <div class="bg-thumb"></div>
          <div class="bg-lines"><div class="bg-line-a"></div><div class="bg-line-b"></div><div class="bg-line-c"></div></div>
        </div>
      </div>
    </div>

    <!-- スクリム -->
    <div class="overlay"></div>

    <!-- ボトムシート -->
    <div class="sheet">
      <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>

      <div class="sheet-nav">
        <div class="sheet-nav-close">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="3" x2="15" y2="15"/>
            <line x1="15" y1="3" x2="3" y2="15"/>
          </svg>
        </div>
        <span class="sheet-nav-title">ビットコインをはじめよう</span>
      </div>

      <div class="paging">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>

      <div class="sheet-body">

        <!-- メッセージ -->
        <p class="message-title">長期でみると、右肩上がり</p>
        <p class="message-body">短期では価格が上下しますが、<br>長期的にはビットコインは値上がりする傾向があります。</p>

        <!-- チャート（Figmaアセット） -->
        <div class="chart-wrap">
          <div class="chart-inner">
            <div class="chart-y-axis">
              <span class="y-label">¥20,000,000</span>
              <span class="y-label">¥15,000,000</span>
              <span class="y-label">¥10,000,000</span>
              <span class="y-label">¥5,000,000</span>
              <span class="y-label">¥0</span>
            </div>
            <div class="chart-images">
              <img class="chart-grid" src="https://www.figma.com/api/mcp/asset/e0394479-7fe1-4edf-aed6-5fb365db412d" alt="">
              <img class="chart-line" src="https://www.figma.com/api/mcp/asset/4074ab51-b023-490c-901f-b205c4f9b751" alt="">
            </div>
          </div>
          <div class="chart-x-labels">
            <span class="x-label">2019</span>
            <span class="x-label">2020</span>
            <span class="x-label">2021</span>
            <span class="x-label">2022</span>
            <span class="x-label">2023</span>
            <span class="x-label">2024</span>
            <span class="x-label">2025</span>
          </div>
          <p class="chart-note">※ 過去の実績は将来の利益を保証するものではありません</p>
        </div>

        <!-- ハイライト -->
        <div class="highlight-row">
          <span class="highlight-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7.5" stroke="#006ed1"/>
              <path d="M8 5v4" stroke="#006ed1" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="8" cy="11.5" r="0.75" fill="#006ed1"/>
            </svg>
          </span>
          <span class="highlight-text">コツコツつみたてることで、<strong>価格の波を平均化</strong>できます</span>
        </div>

        <!-- 次へ -->
        <a class="action-btn" href="bitcoin.html">次へ</a>
        <button class="btn-skip">今はやめておく</button>

      </div>

      <div class="home-indicator"><div class="home-bar"></div></div>
    </div>

  </div>
</body>
</html>
